<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A sleek, modern calculator with glassmorphism design — supports addition, subtraction, multiplication, and division.">
  <title>Premium Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="calculator" id="calculator">
    <!-- Display -->
    <div class="display" id="display">
      <div class="display-expression" id="display-expression"></div>
      <div class="display-current" id="display-current">0</div>
    </div>

    <!-- Button Grid -->
    <div class="buttons">
      <button class="btn btn-function" id="btn-clear" data-action="clear">AC</button>
      <button class="btn btn-function" id="btn-sign" data-action="sign">+/−</button>
      <button class="btn btn-function" id="btn-percent" data-action="percent">%</button>
      <button class="btn btn-operator" id="btn-divide" data-action="divide">÷</button>

      <button class="btn btn-number" id="btn-7" data-number="7">7</button>
      <button class="btn btn-number" id="btn-8" data-number="8">8</button>
      <button class="btn btn-number" id="btn-9" data-number="9">9</button>
      <button class="btn btn-operator" id="btn-multiply" data-action="multiply">×</button>

      <button class="btn btn-number" id="btn-4" data-number="4">4</button>
      <button class="btn btn-number" id="btn-5" data-number="5">5</button>
      <button class="btn btn-number" id="btn-6" data-number="6">6</button>
      <button class="btn btn-operator" id="btn-subtract" data-action="subtract">−</button>

      <button class="btn btn-number" id="btn-1" data-number="1">1</button>
      <button class="btn btn-number" id="btn-2" data-number="2">2</button>
      <button class="btn btn-number" id="btn-3" data-number="3">3</button>
      <button class="btn btn-operator" id="btn-add" data-action="add">+</button>

      <button class="btn btn-number btn-zero" id="btn-0" data-number="0">0</button>
      <button class="btn btn-number" id="btn-decimal" data-number=".">.</button>
      <button class="btn btn-equals" id="btn-equals" data-action="equals">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
